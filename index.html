<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXR SQUAD™ | COMMAND CENTER</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { border: 1px solid #00f2ff; padding: 30px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); width: 95%; max-width: 700px; background: rgba(0,0,0,0.9); }
        h1 { font-size: 1.8em; letter-spacing: 5px; text-transform: uppercase; margin: 0; text-align: center; }
        .status-bar { border-bottom: 1px solid #111; padding: 15px 0; margin-bottom: 20px; font-size: 0.75em; color: #00ff41; letter-spacing: 2px; text-align: center; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 0.8em; border: 1px solid #111; padding: 10px; }
        .grid-info span { color: #555; }
        button { width: 100%; background: #00f2ff; border: none; color: #000; padding: 15px; cursor: pointer; font-weight: bold; font-family: 'Courier New'; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.3s; }
        button:hover { background: #00ff41; box-shadow: 0 0 15px #00ff41; }
        #console-output { margin-top: 25px; background: #000; border: 1px solid #1a1a1a; height: 350px; overflow-y: auto; padding: 15px; font-size: 0.85em; }
        .node-entry { border-left: 2px solid #00f2ff; padding-left: 10px; margin-bottom: 10px; animation: scan 0.5s ease-out; }
        .node-entry b { color: #fff; }
        @keyframes scan { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>LEGENDSHUB™</h1>
        <div class="status-bar">> SYS_STATUS: <span id="sys-status">IDLE_LISTENING</span></div>
        <div class="grid-info">
            <div><span>SCOPE:</span> GLOBAL_ACQUISITION</div>
            <div><span>PROTOCOL:</span> SNI/SSL_443</div>
        </div>
        <button id="main-btn" onclick="engageAcquisition()">INITIALIZE DATA STREAM</button>
        <div id="console-output">
            <div class="node-entry">[SYSTEM] Awaiting Cloudflare Bridge Connection...</div>
        </div>
    </div>

    <script>
        // Use the Cloudflare URL generated in Step 2 here
        const API_URL = "https://YOUR-CLOUDFLARE-URL.trycloudflare.com"; 

        async function engageAcquisition() {
            document.getElementById('sys-status').innerText = "ACQUIRING_DATA_STREAM...";
            document.getElementById('main-btn').innerText = "STREAM_ACTIVE";
            try {
                await fetch(`${API_URL}/start_hunt`); 
                setInterval(refreshStream, 3000); 
            } catch (e) { alert("Bridge Failure: Check Cloudflare Tunnel"); }
        }

        async function refreshStream() {
            try {
                const response = await fetch(`${API_URL}/api/results`);
                const hosts = await response.json();
                const output = document.getElementById('console-output');
                if(hosts.length > 0) {
                    output.innerHTML = ""; 
                    hosts.forEach(host => {
                        const entry = document.createElement('div');
                        entry.className = "node-entry";
                        entry.innerHTML = `[NODE_ACTIVE] <b>${host}</b><br><small>Status: VERIFIED_HANDSHAKE</small>`;
                        output.appendChild(entry);
                    });
                }
            } catch (err) { console.log("Syncing..."); }
        }
    </script>
</body>
</html>
